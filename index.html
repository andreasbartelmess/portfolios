<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>andreas bartelmess</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --vh: 1vh;
      --edge: clamp(12px, 2vw, 36px);
      --top: clamp(10px, 2vw, 36px);
      --bottom: clamp(42px, 4vw, 62px);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 320px;
      overflow: hidden;
      background: #fff;
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .frame {
      width: 100%;
      height: calc(var(--vh) * 100);
      display: grid;
      grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      background: #fff;
      overflow: hidden;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .top-pad {
      min-height: 0;
    }

    .slideshow-wrap {
      min-height: 0;
      min-width: 0;
      position: relative;
      padding: 0 var(--edge);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slideshow {
      touch-action: pan-y;
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0s linear 0.45s;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.45s ease;
    }

    .slide img,
    .contact-bg img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .nav {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .nav.left {
      left: 0;
      padding-left: clamp(2px, 0.6vw, 12px);
    }

    .nav.right {
      right: 0;
      padding-right: clamp(2px, 0.6vw, 12px);
    }

    .nav button {
      pointer-events: auto;
      appearance: none;
      border: 0;
      background: transparent;
      color: #000;
      font-size: clamp(24px, 2.2vw, 34px);
      font-weight: 300;
      line-height: 1;
      opacity: 0.42;
      cursor: pointer;
      padding: 14px 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav button:hover {
      opacity: 1;
    }

    .bottom-bar {
      height: var(--bottom);
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, auto) minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 0 var(--edge);
      background: #fff;
      color: #000;
    }

    .author,
    .contact-wrap button {
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #000;
      white-space: nowrap;
    }

    .author {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slide-title {
      text-align: center;
      font-size: clamp(11px, 0.85vw, 15px);
      font-weight: 400;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48vw;
      color: #000;
    }

    .contact-wrap {
      text-align: right;
      min-width: 0;
    }

    .contact-wrap button {
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      padding: 10px 0;
      -webkit-tap-highlight-color: transparent;
    }

    .contact-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .contact-overlay.active {
      display: flex;
      pointer-events: auto;
    }

    .contact-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .contact-bg img {
      pointer-events: none;
    }

    .contact-info {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 520px);
      padding: clamp(13px, 1.4vw, 24px) clamp(16px, 2vw, 36px);
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #000;
      pointer-events: auto;
    }

    .contact-info .label {
      font-size: clamp(9px, 0.6vw, 11px);
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 0.35em;
    }

    .contact-info .name-line {
      font-size: clamp(14px, 1.1vw, 20px);
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }

    .contact-info a {
      color: #000;
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    /* Tablet / iPad */
    @media (min-width: 700px) and (max-width: 1180px) and (pointer: coarse) {
      :root {
        --edge: clamp(18px, 3vw, 34px);
        --top: clamp(12px, 2vw, 28px);
        --bottom: clamp(54px, 6vw, 76px);
      }

      .author,
      .contact-wrap button {
        font-size: clamp(15px, 1.9vw, 19px);
      }

      .slide-title {
        font-size: clamp(12px, 1.45vw, 15px);
        max-width: 42vw;
      }
    }


    /* Mobile phones: keep swipe, hide visual arrows */
    @media (max-width: 699px), (max-height: 520px) and (pointer: coarse) {
      .nav {
        display: none;
      }
    }

    /* Smartphone portrait */
    @media (max-width: 699px) {
      :root {
        --edge: 12px;
        --top: 8px;
        --bottom: 54px;
      }

      .frame {
        grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      }

      .bottom-bar {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      .slide-title {
        display: none;
      }

      .author,
      .contact-wrap button {
        font-size: 14px;
      }

      .nav {
        display: none;
      }

      .contact-info {
        max-width: calc(100vw - 40px);
      }

      .contact-info .label {
        font-size: 10px;
      }

      .contact-info .name-line {
        font-size: 15px;
      }
    }

    /* Mobile landscape / very low screens */
    @media (max-height: 520px) and (pointer: coarse) {
      :root {
        --edge: 10px;
        --top: 4px;
        --bottom: 36px;
      }

      body {
        position: fixed;
        overflow: hidden;
      }

      .frame {
        grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      }

      .slideshow-wrap {
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .bottom-bar {
        height: var(--bottom);
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .author,
      .contact-wrap button {
        font-size: 12.5px;
        line-height: 1;
      }

      .contact-wrap button {
        padding: 7px 0;
      }

      .slide-title {
        display: none;
      }

      .nav {
        display: none;
      }

      .contact-info {
        max-width: min(86vw, 460px);
        padding: 10px 14px;
      }

      .contact-info .label {
        font-size: 9px;
        margin-bottom: 0.2em;
      }

      .contact-info .name-line {
        font-size: 13px;
        line-height: 1.25;
      }
    }

    /* Small phones in portrait */
    @media (max-width: 380px) and (orientation: portrait) {
      :root {
        --edge: 10px;
        --top: 6px;
        --bottom: 50px;
      }

      .author,
      .contact-wrap button {
        font-size: 13px;
      }

      .contact-info {
        max-width: calc(100vw - 28px);
      }
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="top-pad"></div>

  <main class="slideshow-wrap" aria-label="Fotogalerie">
    <div class="nav left">
      <button id="btnPrev" aria-label="Vorheriges Bild" type="button">&#8249;</button>
    </div>

    <div class="nav right">
      <button id="btnNext" aria-label="Nächstes Bild" type="button">&#8250;</button>
    </div>

    <div class="slideshow" id="slideshow">
      <div class="slide active" data-title="Portrait, Bonn">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/04/Copyright_AndreasBartelmess_IMG_0299_final-1-edited-scaled.jpg" alt="Portrait, Bonn" />
      </div>

      <div class="slide" data-title="Odenwaldhalle">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_odenwaldhalle_01.jpg" alt="Odenwaldhalle" />
      </div>

      <div class="slide" data-title="Wir Komplizen, Dortmund">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/03/Copyright_AndreasBartelmess_0018_24-01-04_Adobe-RGB-1998.jpg" alt="Wir Komplizen, Dortmund" />
      </div>

      <div class="slide" data-title="Colorfull Fruits, Dortmund">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/04/cb5ab22b-b369-4f99-b898-6ed2e2d4005a_rw_1200-e1777200581477-edited.jpg" alt="Colorfull Fruits, Dortmund" />
      </div>

      <div class="slide" data-title="Neuer Standard, Koblenz">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_mattphoto_neuer_standard_01.jpg" alt="Neuer Standard, Koblenz" />
      </div>

      <div class="slide" data-title="Cultivated Spaces, Dortmund">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_cultivatedspaces_01.jpg" alt="Cultivated Spaces, Dortmund" />
      </div>

      <div class="slide" data-title="Neuer Standard, Koblenz">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_mattphoto_neuer_standard_02.jpg" alt="Neuer Standard, Koblenz" />
      </div>

      <div class="contact-overlay" id="contactOverlay" aria-hidden="true">
        <div class="contact-bg" id="contactBg" aria-label="Kontakt schließen"></div>

        <div class="contact-info" role="dialog" aria-label="Kontakt">
          <div class="label">contact</div>
          <div class="name-line"><a href="https://andreasbartelmess.de" target="_blank" rel="noopener">andreasbartelmess.de</a></div>
          <div class="name-line"><a href="mailto:info@andreasbartelmess.de">info@andreasbartelmess.de</a></div>
          <div class="name-line"><a href="tel:+4915735376376">+4915735376376</a></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bottom-bar">
    <span class="author">andreas bartelmess</span>
    <span class="slide-title" id="slideTitle"></span>
    <div class="contact-wrap">
      <button id="btnContact" type="button">contact</button>
    </div>
  </footer>
</div>

<script>
  const root = document.documentElement;
  const slideshow = document.getElementById('slideshow');
  const slides = Array.from(document.querySelectorAll('.slide'));
  const contactOverlay = document.getElementById('contactOverlay');
  const contactBg = document.getElementById('contactBg');
  const slideTitle = document.getElementById('slideTitle');
  const btnContact = document.getElementById('btnContact');
  let current = 0;
  let contactOpen = false;

  function setViewportHeight() {
    root.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
  }

  setViewportHeight();
  window.addEventListener('resize', setViewportHeight);
  window.addEventListener('orientationchange', () => {
    setTimeout(setViewportHeight, 80);
    setTimeout(setViewportHeight, 300);
    setTimeout(setViewportHeight, 700);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setViewportHeight);
  }

  function updateTitle() {
    slideTitle.textContent = contactOpen ? '' : (slides[current].dataset.title || '');
  }

  function goTo(index) {
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    slides[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    updateTitle();

    if (contactOpen) {
      openContact();
    }
  }

  function openContact() {
    const srcImg = slides[current].querySelector('img');
    contactBg.innerHTML = '';

    if (srcImg) {
      const clone = srcImg.cloneNode(false);
      clone.removeAttribute('id');
      clone.removeAttribute('loading');
      contactBg.appendChild(clone);
    }

    contactOpen = true;
    contactOverlay.classList.add('active');
    contactOverlay.setAttribute('aria-hidden', 'false');
    updateTitle();
  }

  function closeContact() {
    contactOpen = false;
    contactOverlay.classList.remove('active');
    contactOverlay.setAttribute('aria-hidden', 'true');
    updateTitle();
  }

  document.getElementById('btnPrev').addEventListener('click', () => {
    contactOpen ? closeContact() : goTo(current - 1);
  });

  document.getElementById('btnNext').addEventListener('click', () => {
    contactOpen ? closeContact() : goTo(current + 1);
  });

  btnContact.addEventListener('click', () => {
    contactOpen ? closeContact() : openContact();
  });

  contactBg.addEventListener('click', closeContact);

  let touchStartX = 0;
  let touchStartY = 0;

  slideshow.addEventListener('touchstart', (event) => {
    touchStartX = event.changedTouches[0].clientX;
    touchStartY = event.changedTouches[0].clientY;
  }, { passive: true });

  slideshow.addEventListener('touchend', (event) => {
    const dx = event.changedTouches[0].clientX - touchStartX;
    const dy = event.changedTouches[0].clientY - touchStartY;

    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.25) {
      contactOpen ? closeContact() : goTo(current + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowLeft') contactOpen ? closeContact() : goTo(current - 1);
    if (event.key === 'ArrowRight') contactOpen ? closeContact() : goTo(current + 1);
    if (event.key === 'Escape' && contactOpen) closeContact();
  });

  updateTitle();
</script>

</body>
</html>
