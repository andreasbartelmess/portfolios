<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>andreas bartelmess</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --vh: 1vh;
      --edge: clamp(12px, 2vw, 36px);
      --top: clamp(10px, 2vw, 36px);
      --bottom: clamp(42px, 4vw, 62px);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 320px;
      overflow: hidden;
      background: #fff;
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .frame {
      width: 100%;
      height: calc(var(--vh) * 100);
      display: grid;
      grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      background: #fff;
      overflow: hidden;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .top-pad {
      min-height: 0;
    }

    .slideshow-wrap {
      min-height: 0;
      min-width: 0;
      position: relative;
      padding: 0 var(--edge);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slideshow {
      touch-action: pan-y;
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0s linear 0.45s;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.45s ease;
    }

    .slide img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .nav {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .nav.left {
      left: 0;
      padding-left: clamp(2px, 0.6vw, 12px);
    }

    .nav.right {
      right: 0;
      padding-right: clamp(2px, 0.6vw, 12px);
    }

    .nav button {
      pointer-events: auto;
      appearance: none;
      border: 0;
      background: transparent;
      color: #000;
      font-size: clamp(24px, 2.2vw, 34px);
      font-weight: 300;
      line-height: 1;
      opacity: 0.42;
      cursor: pointer;
      padding: 14px 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav button:hover {
      opacity: 1;
    }

    .bottom-bar {
      height: var(--bottom);
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, auto) minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 0 var(--edge);
      background: #fff;
      color: #000;
    }

    .author,
    .contact-wrap button {
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 600;
      letter-spacing: 0.012em;
      color: #000;
      white-space: nowrap;
    }

    .author {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slide-title {
      text-align: center;
      font-size: clamp(11px, 0.85vw, 15px);
      font-weight: 430;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48vw;
      color: #000;
      opacity: 1;
      transition: opacity 0.28s ease;
      will-change: opacity;
    }

    .slide-title.changing {
      opacity: 0;
    }

    .contact-wrap {
      text-align: right;
      min-width: 0;
    }

    .contact-wrap button {
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      padding: 10px 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.22s ease;
    }

    .contact-wrap button:hover {
      opacity: 0.66;
    }

    /* ── Cursor-follow image description ───────────────── */
    .frame.image-cursor-active,
    .frame.image-cursor-active * {
      cursor: none;
    }

    .bottom-bar,
    .bottom-bar *,
    .contact-info,
    .contact-info *,
    .nav button {
      cursor: auto;
    }

    .cursor-orb {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 60;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(0.92);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.23);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.20), inset 0 0 18px rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0.18s;
      mix-blend-mode: normal;
    }

    .cursor-orb.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .cursor-orb.clicked {
      transform: translate(-50%, -50%) scale(0.82);
    }

    .image-caption {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 61;
      max-width: min(360px, calc(100vw - 36px));
      transform: translate(18px, 18px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #000;
      text-align: left;
      font-size: clamp(11px, 0.8vw, 14px);
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: 0.04em;
      transition: opacity 0.2s ease, visibility 0s linear 0.2s;
    }

    .image-caption.visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.2s ease;
    }

    .image-caption .caption-title {
      font-weight: 500;
      letter-spacing: 0.055em;
      white-space: nowrap;
    }

    .image-caption .caption-description {
      margin-top: 0.28em;
      font-size: 0.92em;
      letter-spacing: 0.025em;
      opacity: 0.78;
    }

    @media (hover: none), (pointer: coarse) {
      .frame.image-cursor-active,
      .frame.image-cursor-active * {
        cursor: auto;
      }

      .cursor-orb,
      .image-caption {
        display: none;
      }
    }

    .contact-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.48s ease,
        visibility 0s linear 0.48s;
    }

    .contact-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.48s ease,
        visibility 0s linear 0s;
    }

    .contact-overlay.closing {
      opacity: 0;
      visibility: visible;
      pointer-events: none;
      transition:
        opacity 0.44s ease,
        visibility 0s linear 0.44s;
    }

    .contact-bg {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: transparent;
      opacity: 1;
      transform: none;
      transition: none;
    }

    .contact-info {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 520px);
      padding: clamp(13px, 1.4vw, 24px) clamp(16px, 2vw, 36px);
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #000;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(12px) scale(0.982);
      transition:
        opacity 0.42s ease 0.06s,
        transform 0.56s cubic-bezier(.2,.8,.2,1) 0.06s;
      will-change: opacity, transform;
    }

    .contact-overlay.active .contact-info {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .contact-overlay.closing .contact-info {
      opacity: 0;
      transform: translateY(10px) scale(0.986);
      transition:
        opacity 0.30s ease,
        transform 0.36s cubic-bezier(.2,.8,.2,1);
    }

    .contact-info .label {
      font-size: clamp(9px, 0.6vw, 11px);
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 0.35em;
    }

    .contact-info .name-line {
      font-size: clamp(14px, 1.1vw, 20px);
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }

    .contact-info a {
      color: #000;
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    /* Tablet / iPad */
    @media (min-width: 700px) and (max-width: 1180px) and (pointer: coarse) {
      :root {
        --edge: clamp(18px, 3vw, 34px);
        --top: clamp(12px, 2vw, 28px);
        --bottom: clamp(54px, 6vw, 76px);
      }

      .author,
      .contact-wrap button {
        font-size: clamp(15px, 1.9vw, 19px);
      }

      .slide-title {
        font-size: clamp(12px, 1.45vw, 15px);
        max-width: 42vw;
      }
    }

    /* Mobile phones: keep swipe, hide visual arrows */
    @media (max-width: 699px), (max-height: 520px) and (pointer: coarse) {
      .nav {
        display: none;
      }
    }

    /* Smartphone portrait */
    @media (max-width: 699px) {
      :root {
        --edge: 12px;
        --top: 8px;
        --bottom: 54px;
      }

      .frame {
        grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      }

      .bottom-bar {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      .slide-title {
        display: none;
      }

      .author,
      .contact-wrap button {
        font-size: 14px;
      }

      .contact-info {
        max-width: calc(100vw - 40px);
      }

      .contact-info .label {
        font-size: 10px;
      }

      .contact-info .name-line {
        font-size: 15px;
      }
    }

    /* Mobile landscape / very low screens */
    @media (max-height: 520px) and (pointer: coarse) {
      :root {
        --edge: 10px;
        --top: 4px;
        --bottom: 36px;
      }

      body {
        position: fixed;
        overflow: hidden;
      }

      .frame {
        grid-template-rows: var(--top) minmax(0, 1fr) var(--bottom);
      }

      .slideshow-wrap {
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .bottom-bar {
        height: var(--bottom);
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .author,
      .contact-wrap button {
        font-size: 12.5px;
        line-height: 1;
      }

      .contact-wrap button {
        padding: 7px 0;
      }

      .slide-title {
        display: none;
      }

      .contact-info {
        max-width: min(86vw, 460px);
        padding: 10px 14px;
      }

      .contact-info .label {
        font-size: 9px;
        margin-bottom: 0.2em;
      }

      .contact-info .name-line {
        font-size: 13px;
        line-height: 1.25;
      }
    }

    /* Small phones in portrait */
    @media (max-width: 380px) and (orientation: portrait) {
      :root {
        --edge: 10px;
        --top: 6px;
        --bottom: 50px;
      }

      .author,
      .contact-wrap button {
        font-size: 13px;
      }

      .contact-info {
        max-width: calc(100vw - 28px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .slide-title,
      .contact-overlay,
      .contact-bg,
      .contact-info,
      .image-caption,
      .cursor-orb {
        transition: none !important;
      }
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="top-pad"></div>

  <main class="slideshow-wrap" aria-label="Fotogalerie">
    <div class="nav left">
      <button id="btnPrev" aria-label="Vorheriges Bild" type="button">&#8249;</button>
    </div>

    <div class="nav right">

    <div class="slideshow" id="slideshow">
      <div class="slide active" data-title="Portrait, Bonn (2021)" data-description="Freies Portrait als Studienarbeit">

      <div class="slide" data-title="Neuer Standard, Koblenz (2020)" data-description="Corporate Fotos für die Agentur Neuer Standard in Koblenz">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_mattphoto_neuer_standard_02.jpg" alt="Neuer Standard, Koblenz" />

      <div class="slide" data-title="Wir Komplizen, Dortmund (2023)" data-description="Studienarbeit über das Restaurant &quot;Wir Komplizen&quot;">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_Wir_Komplizen_01-scaled.jpg" alt="Wir Komplizen, Dortmund (2023)" />
      </div>

      <div class="slide" data-title="Mausbachs Brotkörbchen, Brohl-Lützingen (2022)" data-description="Freie Arbeit">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/copyright_andreasbartelmess_mattphoto_mausbachs_brotkoerbchen_01-1.jpg" alt="Mausbachs Brotkörbchen, Brohl-Lützingen (2022)" />
      </div>

      <div class="slide" data-title="Goldbeck Werkseröffnung, Kirchberg (2025)" data-description="Eröffnung des Fertigbetonteilwerks in Kirchberg">
        <img src="https://andreasbartelmess.de/wp-content/uploads/2026/05/MPH9611.jpg" alt="Goldbeck Werkseröffnung, Kirchberg (2025)" />
      </div>

      <div class="cursor-orb" id="cursorOrb" aria-hidden="true"></div>

      <div class="image-caption" id="imageCaption" aria-hidden="true">
        <div class="caption-title" id="captionTitle"></div>
        <div class="caption-description" id="captionDescription"></div>
      </div>

      <div class="contact-overlay" id="contactOverlay" aria-hidden="true">
        <div class="contact-bg" id="contactBg" aria-label="Kontakt schließen"></div>

        <div class="contact-info" role="dialog" aria-label="Kontakt">
          <div class="label">contact</div>
          <div class="name-line"><a href="https://andreasbartelmess.de" target="_blank" rel="noopener">andreasbartelmess.de</a></div>
          <div class="name-line"><a href="mailto:info@andreasbartelmess.de">info@andreasbartelmess.de</a></div>

    </div>
  </main>

  <footer class="bottom-bar">
    <span class="author">andreas bartelmess</span>
    <span class="slide-title" id="slideTitle"></span>
    <div class="contact-wrap">
      <button id="btnContact" type="button">contact</button>
    </div>
  </footer>
</div>

<script>
  const root = document.documentElement;
  const frame = document.querySelector('.frame');
  const slideshow = document.getElementById('slideshow');
  const slideshowWrap = document.querySelector('.slideshow-wrap');
  const slides = Array.from(document.querySelectorAll('.slide'));
  const contactOverlay = document.getElementById('contactOverlay');
  const contactBg = document.getElementById('contactBg');
  const slideTitle = document.getElementById('slideTitle');
  const btnContact = document.getElementById('btnContact');
  const imageCaption = document.getElementById('imageCaption');
  const cursorOrb = document.getElementById('cursorOrb');
  const captionTitle = document.getElementById('captionTitle');
  const captionDescription = document.getElementById('captionDescription');
  let current = 0;
  let contactOpen = false;
  let captionPinned = false;
  let cursorX = 0;
  let cursorY = 0;

  function setViewportHeight() {
    root.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
  }

  setViewportHeight();
  window.addEventListener('resize', setViewportHeight);
  window.addEventListener('orientationchange', () => {
    setTimeout(setViewportHeight, 80);
    setTimeout(setViewportHeight, 300);
    setTimeout(setViewportHeight, 700);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setViewportHeight);
  }

  function getCurrentCaptionData() {
    const slide = slides[current];
    return {
      title: slide.dataset.title || '',
      description: slide.dataset.description || ''
    };
  }

  function positionCursorUI(x, y) {
    cursorX = x;
    cursorY = y;

    if (cursorOrb) {
      cursorOrb.style.left = `${x}px`;
      cursorOrb.style.top = `${y}px`;
    }

    if (imageCaption) {
      const offset = 20;
      let left = x + offset;
      let top = y + offset;

      const rect = imageCaption.getBoundingClientRect();
      const margin = 14;

      if (left + rect.width > window.innerWidth - margin) {
        left = x - rect.width - offset;
      }

      if (top + rect.height > window.innerHeight - margin) {
        top = y - rect.height - offset;
      }

      imageCaption.style.left = `${Math.max(margin, left)}px`;
      imageCaption.style.top = `${Math.max(margin, top)}px`;
    }
  }

  function prepareImageCaption() {
    if (contactOpen || !imageCaption) return;

    const data = getCurrentCaptionData();
    if (!data.title && !data.description) return;

    captionTitle.textContent = data.title;
    captionDescription.textContent = data.description;

    captionDescription.style.display =
      data.description && data.description !== data.title ? 'block' : 'none';

    positionCursorUI(cursorX, cursorY);
  }

  function showImageCaption() {
    if (contactOpen || !imageCaption) return;
    prepareImageCaption();
    imageCaption.classList.add('visible');
    imageCaption.setAttribute('aria-hidden', 'false');
  }

  function hideImageCaption() {
    captionPinned = false;

    if (imageCaption) {
      imageCaption.classList.remove('visible');
      imageCaption.setAttribute('aria-hidden', 'true');
    }

    if (cursorOrb) {
      cursorOrb.classList.remove('clicked');
    }
  }

  function showCursorOrb() {
    if (contactOpen || !cursorOrb) return;
    cursorOrb.classList.add('visible');
  }

  function hideCursorOrb() {
    frame?.classList.remove('image-cursor-active');
    if (cursorOrb) {
      cursorOrb.classList.remove('visible', 'clicked');
    }
    hideImageCaption();
  }

  function updateTitle(immediate = false) {
    const nextTitle = contactOpen ? '' : (slides[current].dataset.title || '');

    if (immediate) {
      slideTitle.textContent = nextTitle;
      slideTitle.classList.remove('changing');
      return;
    }

    slideTitle.classList.add('changing');

    window.clearTimeout(updateTitle._timer);
    updateTitle._timer = window.setTimeout(() => {
      slideTitle.textContent = nextTitle;
      slideTitle.classList.remove('changing');
    }, 170);
  }

  function goTo(index) {
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    deactivateImageCursor();
    hideImageCaption();
    slides[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    updateTitle();

    if (contactOpen) {
      openContact();
    }
  }

  function openContact() {
    hideCursorOrb();

    contactOpen = true;
    contactOverlay.classList.remove('closing');
    contactOverlay.setAttribute('aria-hidden', 'false');

    requestAnimationFrame(() => {
      contactOverlay.classList.add('active');
    });

    updateTitle();
  }

  function closeContact() {
    contactOpen = false;
    contactOverlay.classList.remove('active');
    contactOverlay.classList.add('closing');
    contactOverlay.setAttribute('aria-hidden', 'true');
    updateTitle();

    window.clearTimeout(closeContact._timer);
    closeContact._timer = window.setTimeout(() => {
      contactOverlay.classList.remove('closing');
    }, 460);
  }

  document.getElementById('btnPrev').addEventListener('click', () => {
    contactOpen ? closeContact() : goTo(current - 1);
  });

  document.getElementById('btnNext').addEventListener('click', () => {
    contactOpen ? closeContact() : goTo(current + 1);
  });

  btnContact.addEventListener('click', () => {
    contactOpen ? closeContact() : openContact();
  });

  contactBg.addEventListener('click', closeContact);

  function getActiveImageRect() {
    const img = slides[current]?.querySelector('img');
    return img ? img.getBoundingClientRect() : null;
  }

  function isInsideActiveImage(event) {
    if (contactOpen) return false;
    if (event.target.closest('.bottom-bar, .contact-info, .contact-overlay.active, button, a')) return false;

    const rect = getActiveImageRect();
    if (!rect) return false;

    return (
      event.clientX >= rect.left &&
      event.clientX <= rect.right &&
      event.clientY >= rect.top &&
      event.clientY <= rect.bottom
    );
  }

  function activateImageCursor(event) {
    frame?.classList.add('image-cursor-active');
    positionCursorUI(event.clientX, event.clientY);
    showCursorOrb();

    if (captionPinned) {
      showImageCaption();
    }
  }

  function deactivateImageCursor() {
    frame?.classList.remove('image-cursor-active');
    hideCursorOrb();
  }

  const cursorZone = slideshowWrap || slideshow;

  cursorZone.addEventListener('mousemove', (event) => {
    if (isInsideActiveImage(event)) {
      activateImageCursor(event);
    } else {
      deactivateImageCursor();
    }
  });

  cursorZone.addEventListener('mouseleave', deactivateImageCursor);

  cursorZone.addEventListener('click', (event) => {
    if (!isInsideActiveImage(event)) return;

    captionPinned = !captionPinned;

    if (cursorOrb) {
      cursorOrb.classList.toggle('clicked', captionPinned);
    }

    if (captionPinned) {
      activateImageCursor(event);
      showImageCaption();
    } else {
      hideImageCaption();
      showCursorOrb();
    }
  });

  let touchStartX = 0;
  let touchStartY = 0;

  slideshow.addEventListener('touchstart', (event) => {
    touchStartX = event.changedTouches[0].clientX;
    touchStartY = event.changedTouches[0].clientY;
  }, { passive: true });

  slideshow.addEventListener('touchend', (event) => {
    const dx = event.changedTouches[0].clientX - touchStartX;
    const dy = event.changedTouches[0].clientY - touchStartY;

    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.25) {
      contactOpen ? closeContact() : goTo(current + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowLeft') contactOpen ? closeContact() : goTo(current - 1);
    if (event.key === 'ArrowRight') contactOpen ? closeContact() : goTo(current + 1);
    if (event.key === 'Escape' && contactOpen) closeContact();
  });

  updateTitle(true);
</script>

</body>
</html>
